title: App Store
# email: no-reply@appstore.no
description: >- # this means to ignore newlines until "baseurl:"
  Look at all the apps! 
baseurl: "" # the subpath of your site, e.g. /blog
url: "https://appstore.no" # the base hostname & protocol for your site, e.g. http://example.com
google_analytics: UA-8420880-19

collections:
  apps:
    sortby: title
    output: true
    
feed:
  collections:
    - apps

# Build settings
theme: minima
plugins:
  - jekyll-feed

# Files to exclude from the built site (not published).
# Re-includes Jekyll's defaults since this key overrides them.
exclude:
  - AGENTS.md
  - Gemfile
  - Gemfile.lock
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - node_modules/
  - .sass-cache/
  - .jekyll-cache/

